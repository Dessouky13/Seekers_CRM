# Seekers AI OS — Nginx reverse proxy config
# Copy to: /etc/nginx/sites-available/seekersai
# Symlink: sudo ln -s /etc/nginx/sites-available/seekersai /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.seekersai.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.seekersai.org;

    # SSL — managed by Certbot (certbot --nginx -d api.seekersai.org)
    ssl_certificate     /etc/letsencrypt/live/api.seekersai.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.seekersai.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Serve uploaded files directly (no Node.js overhead)
    location /uploads/ {
        alias /var/www/seekersai/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Proxy API requests to Hono server
    location / {
        proxy_pass          http://localhost:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_read_timeout  120s;

        # Allow uploads up to 51 MB (MAX_FILE_SIZE_MB + 1 MB buffer)
        client_max_body_size 51M;
    }
}
